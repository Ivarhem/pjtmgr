services:
  db:
    image: postgres:16
    container_name: pjtmgr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pjtmgr}
      POSTGRES_USER: ${POSTGRES_USER:-pjtmgr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - pjtmgr_postgres_data:/var/lib/postgresql/data

  app:
    container_name: pjtmgr-app
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ENV: ${ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://pjtmgr:${POSTGRES_PASSWORD}@db:5432/pjtmgr}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:?SESSION_SECRET_KEY is required}
      BOOTSTRAP_ADMIN_LOGIN_ID: ${BOOTSTRAP_ADMIN_LOGIN_ID:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-관리자}
      ENABLED_MODULES: ${ENABLED_MODULES:-common,accounting,infra}
      SKIP_LIFESPAN_ALEMBIC: "1"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 9000"]
    ports:
      - "${APP_HOST_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  worker:
    container_name: pjtmgr-worker
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ENV: ${ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://pjtmgr:${POSTGRES_PASSWORD}@db:5432/pjtmgr}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:?SESSION_SECRET_KEY is required}
      ENABLED_MODULES: ${ENABLED_MODULES:-common,accounting,infra}
      SKIP_LIFESPAN_ALEMBIC: "1"
      CATALOG_RESEARCH_AUTO_ENABLED: "true"
      CATALOG_RESEARCH_AUTO_INTERVAL_SECONDS: ${CATALOG_RESEARCH_AUTO_INTERVAL_SECONDS:-180}
      CATALOG_RESEARCH_AUTO_IDLE_SECONDS: ${CATALOG_RESEARCH_AUTO_IDLE_SECONDS:-600}
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: ["python", "-m", "app.core.startup.catalog_research_worker"]
    healthcheck:
      disable: true
    restart: unless-stopped

volumes:
  pjtmgr_postgres_data:
    name: pjtmgr_postgres_data
