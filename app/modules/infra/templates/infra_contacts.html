{% extends "base.html" %}
{% block title %}협력업체 - 프로젝트관리{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ request.scope.root_path or "" }}/static/css/infra_common.css?v=20260428ui">
{% endblock %}

{% block content %}
<div class="page-titlebar">
  <h1>프로젝트 협력업체</h1>
  <div class="page-titlebar-actions"><button class="btn btn-primary" id="btn-add-partner">협력업체 배정</button></div>
</div>

<p class="text-secondary text-sm mb-md">
  현재 고객사와 프로젝트 범위를 기준으로 참여 업체, 담당자, 담당 자산 및 운영 범위를 함께 관리합니다.
</p>

<div id="partners-list" class="project-partners-grid app-grid app-grid-fill">
  <p class="text-muted">고객사를 선택하세요.</p>
</div>

<!-- 협력업체 배정 모달 -->
<dialog id="modal-project-partner" class="modal">
  <h2 id="modal-pc-title">협력업체 배정</h2>
  <form class="form-grid">
    <input type="hidden" id="pc-id">
    <label><span class="label-text">거래처<span class="req">*</span></span>
      <select id="pc-partner-id" required></select>
    </label>
    <label><span class="label-text">역할<span class="req">*</span></span>
      <select id="pc-role" required>
        <option value="고객사">고객사</option>
        <option value="수행사">수행사</option>
        <option value="유지보수사">유지보수사</option>
        <option value="통신사">통신사</option>
        <option value="벤더">벤더</option>
      </select>
    </label>
    <label class="full-width">
      담당 범위/자산
      <input type="text" id="pc-scope-text" placeholder="예: 방화벽 운영, 백업 서버, 대외망 회선">
    </label>
    <label class="full-width">
      비고
      <textarea id="pc-note" rows="2"></textarea>
    </label>
  </form>
  <div class="modal-actions">
    <button class="btn btn-secondary" id="btn-cancel-pc">취소</button>
    <button class="btn btn-primary" id="btn-save-pc">저장</button>
  </div>
</dialog>

<!-- 담당자 연결 모달 -->
<dialog id="modal-project-partner-contact" class="modal">
  <h2 id="modal-pcc-title">담당자 연결</h2>
  <form class="form-grid">
    <input type="hidden" id="pcc-id">
    <input type="hidden" id="pcc-project-partner-id">
    <label><span class="label-text">담당자<span class="req">*</span></span>
      <select id="pcc-contact-id" required></select>
    </label>
    <label><span class="label-text">프로젝트 역할<span class="req">*</span></span>
      <select id="pcc-project-role" required>
        <option value="고객PM">고객PM</option>
        <option value="고객실무">고객실무</option>
        <option value="승인자">승인자</option>
        <option value="수행PM">수행PM</option>
        <option value="구축엔지니어">구축엔지니어</option>
        <option value="유지보수담당">유지보수담당</option>
        <option value="보안업무담당">보안업무담당</option>
      </select>
    </label>
    <label class="full-width">
      비고
      <textarea id="pcc-note" rows="2"></textarea>
    </label>
  </form>
  <div class="modal-actions">
    <button class="btn btn-secondary" id="btn-cancel-pcc">취소</button>
    <button class="btn btn-primary" id="btn-save-pcc">저장</button>
  </div>
</dialog>
{% endblock %}

{% block scripts %}
<script src="{{ request.scope.root_path or "" }}/static/js/infra_contacts.js?v=20260413e"></script>
{% endblock %}
