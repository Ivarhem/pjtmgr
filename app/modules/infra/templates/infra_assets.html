{% extends "base.html" %}
{% block title %}자산 인벤토리{% endblock %}

{% block styles %}
<link rel="stylesheet" href="/static/css/infra_common.css">
{% endblock %}

{% block content %}
<div class="tab-nav">
  <a href="/assets" class="tab-btn active">자산 목록</a>
  <a href="/ip-inventory" class="tab-btn">IP 인벤토리</a>
  <a href="/port-maps" class="tab-btn">포트맵</a>
  <label class="chk-inline tab-nav-filter"><input type="checkbox" id="chk-project-filter"> 선택 프로젝트만</label>
</div>

<div class="page-header">
  <h1>자산 목록</h1>
  <div class="page-header-actions">
    <button class="btn btn-secondary" id="btn-import-asset">Import</button>
    <button class="btn btn-primary" id="btn-add-asset">자산 등록</button>
  </div>
</div>

<div class="filter-bar">
  <label>검색
    <input type="text" id="filter-search" placeholder="자산명, 호스트명, IP, 장비ID">
  </label>
  <label>유형
    <select id="filter-type"></select>
  </label>
  <label>상태
    <select id="filter-status">
      <option value="">전체</option>
      <option value="active">운영중</option>
      <option value="planned">계획</option>
      <option value="decommissioned">폐기</option>
    </select>
  </label>
</div>

<div class="card">
  <div id="grid-assets" class="ag-theme-quartz infra-grid infra-grid-480"></div>
</div>

<!-- 하단 상세 패널 -->
<div id="asset-detail-panel" class="detail-panel hidden">
  <div class="detail-header">
    <span id="detail-asset-name" class="detail-title"></span>
    <div class="detail-header-actions">
      <button class="btn btn-sm btn-secondary" id="btn-edit-asset">수정</button>
      <button class="btn btn-sm btn-danger" id="btn-delete-asset">삭제</button>
      <button class="btn btn-sm" id="btn-close-detail" title="닫기">&times;</button>
    </div>
  </div>
  <div class="detail-tabs">
    <button class="tab-btn active" data-dtab="basic">기본 정보</button>
    <button class="tab-btn" data-dtab="location">설치 위치</button>
    <button class="tab-btn" data-dtab="network">네트워크</button>
    <button class="tab-btn" data-dtab="hw">HW 사양</button>
    <button class="tab-btn" data-dtab="mgmt">자산 관리</button>
    <button class="tab-btn" data-dtab="software">소프트웨어</button>
    <button class="tab-btn" data-dtab="ip">IP 할당</button>
    <button class="tab-btn" data-dtab="contacts">담당자</button>
    <button class="tab-btn" data-dtab="relations">관계</button>
    <button class="tab-btn" data-dtab="aliases">별칭</button>
  </div>
  <div id="detail-content" class="detail-body"></div>
</div>

<!-- 자산 등록 모달 (간소화) -->
<dialog id="modal-asset" class="modal">
  <h2>자산 등록</h2>
  <form id="form-asset">
    <!-- 카탈로그 제품 (필수) -->
    <label>
      카탈로그 제품 <span class="text-danger">*</span>
      <div class="catalog-search-wrap">
        <input type="text" id="catalog-search" placeholder="제조사 또는 모델명 검색" autocomplete="off">
        <input type="hidden" id="catalog-id">
        <div id="catalog-dropdown" class="catalog-dropdown hidden"></div>
      </div>
    </label>
    <div id="catalog-summary" class="catalog-summary hidden"></div>

    <!-- 인라인 카탈로그 등록 -->
    <fieldset id="inline-catalog-form" class="modal-group hidden">
      <legend class="modal-group-title">새 제품 등록</legend>
      <div class="form-grid">
        <label>제조사 <span class="text-danger">*</span> <input type="text" id="inline-vendor" required></label>
        <label>모델명 <span class="text-danger">*</span> <input type="text" id="inline-model" required></label>
        <label>카테고리 <span class="text-danger">*</span> <input type="text" id="inline-category" required></label>
        <label>자산유형 <span class="text-danger">*</span> <select id="inline-asset-type" required></select></label>
      </div>
      <div class="modal-actions" style="margin-top:8px">
        <button type="button" class="btn btn-secondary btn-sm" id="btn-inline-cancel">취소</button>
        <button type="button" class="btn btn-primary btn-sm" id="btn-inline-save">등록</button>
      </div>
    </fieldset>

    <!-- 자산명 (필수) -->
    <label>
      자산명 <span class="text-danger">*</span>
      <input type="text" id="asset-name" required>
    </label>

    <!-- 호스트명 (선택) -->
    <label>
      호스트명
      <input type="text" id="asset-hostname">
    </label>

    <!-- 귀속사업 (선택) -->
    <label>
      귀속사업
      <select id="asset-period">
        <option value="">-- 선택 안함 --</option>
      </select>
    </label>
  </form>
  <div class="modal-actions">
    <button class="btn btn-secondary" id="btn-cancel-asset">취소</button>
    <button class="btn btn-primary" id="btn-save-asset">등록</button>
  </div>
</dialog>
<!-- 소프트웨어 추가/수정 모달 -->
<dialog id="modal-software" class="modal">
  <h2 id="modal-software-title">소프트웨어 추가</h2>
  <form id="form-software">
    <input type="hidden" id="sw-id">
    <div class="form-grid">
      <label>소프트웨어명 <input type="text" id="sw-name" required></label>
      <label>버전 <input type="text" id="sw-version"></label>
      <label>라이선스 유형 <input type="text" id="sw-license-type"></label>
      <label>라이선스 수량 <input type="number" id="sw-license-count" min="0"></label>
      <label>관계 유형
        <select id="sw-relation-type">
          <option value="installed">설치됨</option>
          <option value="managed">관리됨</option>
          <option value="dependent">의존</option>
        </select>
      </label>
      <label>비고 <input type="text" id="sw-note"></label>
    </div>
  </form>
  <div class="modal-actions">
    <button class="btn btn-secondary" id="btn-cancel-sw">취소</button>
    <button class="btn btn-primary" id="btn-save-sw">저장</button>
  </div>
</dialog>

<!-- IP 할당 추가/수정 모달 -->
<dialog id="modal-ip" class="modal">
  <h2 id="modal-ip-title">IP 추가</h2>
  <form id="form-ip">
    <input type="hidden" id="ip-id">
    <div class="form-grid">
      <label>IP 주소 <input type="text" id="ip-address" required></label>
      <label>유형
        <select id="ip-type">
          <option value="service">서비스</option>
          <option value="management">관리</option>
          <option value="heartbeat">하트비트</option>
          <option value="backup">백업</option>
          <option value="other">기타</option>
        </select>
      </label>
      <label>인터페이스 <input type="text" id="ip-interface"></label>
      <label>호스트명 <input type="text" id="ip-hostname"></label>
      <label>VLAN <input type="text" id="ip-vlan"></label>
      <label>네트워크 <input type="text" id="ip-network"></label>
      <label>서브넷 마스크 <input type="text" id="ip-netmask"></label>
      <label>게이트웨이 <input type="text" id="ip-gateway"></label>
      <label class="chk-inline"><input type="checkbox" id="ip-is-primary"> 대표 IP</label>
      <label>비고 <input type="text" id="ip-note"></label>
    </div>
  </form>
  <div class="modal-actions">
    <button class="btn btn-secondary" id="btn-cancel-ip">취소</button>
    <button class="btn btn-primary" id="btn-save-ip">저장</button>
  </div>
</dialog>

<!-- 담당자 연결 모달 -->
<dialog id="modal-contact" class="modal">
  <h2>담당자 연결</h2>
  <form id="form-contact">
    <input type="hidden" id="ct-id">
    <div class="form-grid">
      <label>담당자 ID <input type="number" id="ct-contact-id" required></label>
      <label>역할 <input type="text" id="ct-role" placeholder="예: 운영, 보안, 네트워크"></label>
    </div>
  </form>
  <div class="modal-actions">
    <button class="btn btn-secondary" id="btn-cancel-ct">취소</button>
    <button class="btn btn-primary" id="btn-save-ct">저장</button>
  </div>
</dialog>

<!-- 관계 추가 모달 -->
<dialog id="modal-relation" class="modal">
  <h2 id="modal-relation-title">관계 추가</h2>
  <form id="form-relation">
    <input type="hidden" id="rel-id">
    <div class="form-grid">
      <label>대상 자산 ID <input type="number" id="rel-dst-asset-id" required></label>
      <label>관계 유형
        <select id="rel-type">
          <option value="HOSTS">HOSTS</option>
          <option value="INSTALLED_ON">INSTALLED_ON</option>
          <option value="PROTECTS">PROTECTS</option>
          <option value="CONNECTS_TO">CONNECTS_TO</option>
          <option value="DEPENDS_ON">DEPENDS_ON</option>
          <option value="BACKUP_OF">BACKUP_OF</option>
          <option value="HA_PAIR">HA_PAIR</option>
          <option value="OTHER">OTHER</option>
        </select>
      </label>
      <label>비고 <input type="text" id="rel-note"></label>
    </div>
  </form>
  <div class="modal-actions">
    <button class="btn btn-secondary" id="btn-cancel-rel">취소</button>
    <button class="btn btn-primary" id="btn-save-rel">저장</button>
  </div>
</dialog>

<!-- 별칭 추가/수정 모달 -->
<dialog id="modal-alias" class="modal">
  <h2 id="modal-alias-title">별칭 추가</h2>
  <form id="form-alias">
    <input type="hidden" id="alias-id">
    <div class="form-grid">
      <label>별칭 이름 <input type="text" id="alias-name" required></label>
      <label>유형
        <select id="alias-type">
          <option value="INTERNAL">내부</option>
          <option value="CUSTOMER">고객사</option>
          <option value="VENDOR">벤더</option>
          <option value="TEAM">팀</option>
          <option value="LEGACY">레거시</option>
          <option value="ETC">기타</option>
        </select>
      </label>
      <label>출처 업체 ID <input type="number" id="alias-source-partner"></label>
      <label>출처 텍스트 <input type="text" id="alias-source-text"></label>
      <label>비고 <input type="text" id="alias-note"></label>
      <label class="chk-inline"><input type="checkbox" id="alias-is-primary"> 대표 별칭</label>
    </div>
  </form>
  <div class="modal-actions">
    <button class="btn btn-secondary" id="btn-cancel-alias">취소</button>
    <button class="btn btn-primary" id="btn-save-alias">저장</button>
  </div>
</dialog>
{% endblock %}

{% block scripts %}
<script src="/static/js/infra_assets.js"></script>
{% endblock %}
