{% extends "base.html" %}
{% block title %}이력 - 프로젝트관리{% endblock %}

{% block styles %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32/styles/ag-grid.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32/styles/ag-theme-quartz.min.css">
<link rel="stylesheet" href="{{ request.scope.root_path or "" }}/static/css/infra_common.css">
{% endblock %}

{% block head_scripts %}
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community@32/dist/ag-grid-community.min.js"></script>
{% endblock %}

{% block content %}
<div class="page-header">
  <h1>변경 이력</h1>
</div>

<p class="text-secondary text-sm mb-md">
  현재 고객사와 프로젝트 범위를 기준으로 자산, 네트워크, 프로젝트 변경 이력을 조회합니다.
</p>

<div class="card">
  <div id="grid-history" class="ag-theme-quartz infra-grid infra-grid-tall"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ request.scope.root_path or "" }}/static/js/infra_audit_history.js"></script>
{% endblock %}
