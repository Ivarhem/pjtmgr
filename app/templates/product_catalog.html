{% extends "base.html" %}
{% block title %}제품 카탈로그{% endblock %}
{% block styles %}<link rel="stylesheet" href="/static/css/infra_common.css">{% endblock %}
{% block content %}
<div class="page-header">
  <h1>제품 카탈로그</h1>
  <div class="header-actions">
    <button class="btn btn-primary" id="btn-add-product">+ 제품 등록</button>
  </div>
</div>

<p class="data-note">HW 제품 사양 및 EOS/EOSL 정보를 관리합니다. 좌측에서 제품을 선택하면 우측에 상세 정보가 표시됩니다.</p>

<div class="catalog-layout">
  <!-- 좌측: 제품 목록 -->
  <div class="catalog-list-panel">
    <div class="catalog-toolbar">
      <input type="text" id="catalog-search" class="input-search" placeholder="제조사/모델 검색">
      <select id="catalog-category-filter" class="input-select">
        <option value="">전체 분류</option>
      </select>
    </div>
    <div id="grid-catalog" class="ag-theme-quartz catalog-grid"></div>
  </div>

  <!-- 스플리터 -->
  <div class="catalog-splitter" id="catalog-splitter"></div>

  <!-- 우측: 상세 -->
  <div class="catalog-detail-panel" id="detail-panel">
    <div class="catalog-detail-empty" id="detail-empty">
      <p>좌측에서 제품을 선택하세요.</p>
    </div>
    <div class="catalog-detail-content is-hidden" id="detail-content">
      <div class="catalog-detail-header">
        <h2 id="detail-title"></h2>
        <div class="header-actions">
          <button class="btn btn-secondary btn-sm" id="btn-edit-product">수정</button>
          <button class="btn btn-danger btn-sm" id="btn-delete-product">삭제</button>
        </div>
      </div>

      <!-- 탭 -->
      <div class="catalog-tabs" id="catalog-tabs">
        <button class="catalog-tab active" data-tab="info">기본정보</button>
        <button class="catalog-tab" data-tab="spec">HW 스펙</button>
        <button class="catalog-tab" data-tab="interfaces">인터페이스</button>
        <button class="catalog-tab" data-tab="eosl">EOS/EOSL</button>
      </div>

      <!-- 기본정보 탭 -->
      <div class="catalog-tab-panel active" id="tab-info">
        <div class="info-grid" id="info-grid"></div>
      </div>

      <!-- HW 스펙 탭 -->
      <div class="catalog-tab-panel" id="tab-spec">
        <div class="catalog-section-header">
          <button class="btn btn-primary btn-sm" id="btn-save-spec">스펙 저장</button>
        </div>
        <div class="spec-form" id="spec-form">
          <div class="form-grid">
            <label>Size (U) <input type="number" id="spec-size-unit"></label>
            <label>폭 (mm) <input type="number" id="spec-width-mm"></label>
            <label>높이 (mm) <input type="number" id="spec-height-mm"></label>
            <label>깊이 (mm) <input type="number" id="spec-depth-mm"></label>
            <label>무게 (kg) <input type="number" step="0.1" id="spec-weight-kg"></label>
            <label>전원 수량 <input type="number" id="spec-power-count"></label>
            <label>전원 유형 <input type="text" id="spec-power-type" placeholder="AC / DC"></label>
            <label>전원 (W) <input type="number" id="spec-power-watt"></label>
            <label class="full-width">CPU 요약 <input type="text" id="spec-cpu-summary"></label>
            <label class="full-width">메모리 요약 <input type="text" id="spec-memory-summary"></label>
            <label class="full-width">처리량 요약 <input type="text" id="spec-throughput-summary"></label>
            <label class="full-width">OS/Firmware <input type="text" id="spec-os-firmware"></label>
            <label class="full-width">스펙 URL <input type="url" id="spec-spec-url"></label>
          </div>
        </div>
      </div>

      <!-- 인터페이스 탭 -->
      <div class="catalog-tab-panel" id="tab-interfaces">
        <div class="catalog-section-header">
          <button class="btn btn-primary btn-sm" id="btn-add-interface">+ 인터페이스 추가</button>
        </div>
        <div id="grid-interfaces" class="ag-theme-quartz catalog-sub-grid"></div>
      </div>

      <!-- EOS/EOSL 탭 -->
      <div class="catalog-tab-panel" id="tab-eosl">
        <div class="catalog-section-header">
          <button class="btn btn-primary btn-sm" id="btn-save-eosl">EOSL 저장</button>
        </div>
        <div class="form-grid">
          <label>EOS 일자 <input type="date" id="eosl-eos-date"></label>
          <label>EOSL 일자 <input type="date" id="eosl-eosl-date"></label>
          <label class="full-width">EOSL 비고 <textarea id="eosl-eosl-note" rows="3"></textarea></label>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 제품 등록/수정 모달 -->
<dialog id="modal-product" class="modal modal-sm">
  <h2 id="modal-product-title">제품 등록</h2>
  <form id="form-product" class="form-grid">
    <input type="hidden" id="product-id">
    <label>제조사 <input type="text" id="product-vendor" required></label>
    <label>모델명 <input type="text" id="product-name" required></label>
    <label>제품유형
      <select id="product-type">
        <option value="hardware">Hardware</option>
        <option value="software">Software</option>
        <option value="license">License</option>
      </select>
    </label>
    <label>분류 <input type="text" id="product-category" required placeholder="네트워크, 서버, 보안 등"></label>
    <label class="full-width">참조 URL <input type="url" id="product-reference-url" placeholder="https://..."></label>
  </form>
  <div class="modal-actions">
    <button class="btn btn-secondary" id="btn-cancel-product">취소</button>
    <button class="btn btn-primary" id="btn-save-product">등록</button>
  </div>
</dialog>

<!-- 인터페이스 등록/수정 모달 -->
<dialog id="modal-interface" class="modal modal-sm">
  <h2 id="modal-iface-title">인터페이스 추가</h2>
  <form id="form-interface" class="form-grid">
    <input type="hidden" id="iface-id">
    <label>인터페이스 유형 <input type="text" id="iface-type" required placeholder="GE, 10GE, 40GE, 100GE ..."></label>
    <label>속도 <input type="text" id="iface-speed" placeholder="1Gbps"></label>
    <label>수량 <input type="number" id="iface-count" required min="1" value="1"></label>
    <label>커넥터 유형 <input type="text" id="iface-connector" placeholder="SFP+, RJ45 ..."></label>
    <label>구분
      <select id="iface-capacity-type">
        <option value="fixed">고정 (fixed)</option>
        <option value="base">기본 (base)</option>
        <option value="max">최대 (max)</option>
      </select>
    </label>
    <label class="full-width">비고 <input type="text" id="iface-note"></label>
  </form>
  <div class="modal-actions">
    <button class="btn btn-secondary" id="btn-cancel-iface">취소</button>
    <button class="btn btn-primary" id="btn-save-iface">추가</button>
  </div>
</dialog>
{% endblock %}

{% block scripts %}
<script src="/static/js/infra_product_catalog.js"></script>
{% endblock %}
