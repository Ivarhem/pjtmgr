<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 변경 - 영업관리 시스템</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/change_password.css">
</head>
<body class="change-password-page">
  <div class="change-password-card">
    <div class="change-password-title">비밀번호 변경</div>
    <div class="change-password-desc">초기 비밀번호를 변경해 주세요.<br>변경 후 서비스를 이용할 수 있습니다.</div>
    <div class="change-password-group">
      <label for="current-pw">현재 비밀번호</label>
      <input type="password" id="current-pw" autocomplete="current-password" autofocus>
    </div>
    <div class="change-password-group">
      <label for="new-pw">새 비밀번호 (4자 이상)</label>
      <input type="password" id="new-pw" autocomplete="new-password">
    </div>
    <div class="change-password-group">
      <label for="new-pw2">새 비밀번호 확인</label>
      <input type="password" id="new-pw2" autocomplete="new-password">
    </div>
    <div class="change-password-message" id="msg"></div>
    <button class="btn btn-primary change-password-submit" id="btn-submit" onclick="doChange()">변경하기</button>
  </div>

  <script>
    ['current-pw', 'new-pw', 'new-pw2'].forEach((id, i, arr) => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          if (i < arr.length - 1) document.getElementById(arr[i + 1]).focus();
          else doChange();
        }
      });
    });

    async function doChange() {
      const current_password = document.getElementById('current-pw').value;
      const new_password = document.getElementById('new-pw').value;
      const new_password2 = document.getElementById('new-pw2').value;

      if (!current_password) { showMsg('현재 비밀번호를 입력하세요.', 'error'); return; }
      if (!new_password) { showMsg('새 비밀번호를 입력하세요.', 'error'); return; }
      if (new_password.length < 4) { showMsg('새 비밀번호는 4자 이상이어야 합니다.', 'error'); return; }
      if (new_password !== new_password2) { showMsg('새 비밀번호가 일치하지 않습니다.', 'error'); return; }

      const btn = document.getElementById('btn-submit');
      btn.disabled = true;

      const res = await fetch('/api/v1/auth/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ current_password, new_password }),
      });

      if (res.ok) {
        showMsg('비밀번호가 변경되었습니다. 잠시 후 이동합니다.', 'success');
        setTimeout(() => { window.location.href = '/'; }, 1500);
      } else {
        const err = await res.json().catch(() => ({}));
        showMsg(err.detail || '변경에 실패했습니다.', 'error');
        btn.disabled = false;
      }
    }

    function showMsg(msg, type) {
      const el = document.getElementById('msg');
      el.textContent = msg;
      el.className = `change-password-message ${type}`;
    }
  </script>
</body>
</html>
