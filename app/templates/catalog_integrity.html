{% extends "base.html" %}
{% block title %}기준정보 관리{% endblock %}
{% block styles %}<link rel="stylesheet" href="/static/css/infra_common.css">{% endblock %}
{% block content %}
<div class="tab-nav">
  <a href="/product-catalog" class="tab-btn">제품 카탈로그</a>
  <a href="/catalog-management/integrity" class="tab-btn active">기준정보 관리</a>
</div>

<div class="mdm-layout">
  <!-- 좌: 제조사 목록 -->
  <section class="mdm-list-panel" id="mdm-list-panel">
    <div class="mdm-panel-toolbar">
      <input type="text" class="input-search" id="catalog-integrity-vendor-search" placeholder="제조사 검색">
      <button type="button" class="btn btn-primary btn-sm vendor-write-only" id="btn-integrity-vendor-add">+ 신규</button>
    </div>
    <div id="grid-catalog-integrity-vendors" class="ag-theme-quartz mdm-list-grid"></div>
  </section>

  <!-- 스플리터 -->
  <div class="mdm-splitter" id="mdm-splitter"></div>

  <!-- 우: 상세 -->
  <section class="mdm-detail-panel">
    <div id="integrity-vendor-empty" class="mdm-detail-empty">
      <p>좌측에서 제조사를 선택하거나<br>새 제조사를 추가하세요.</p>
    </div>
    <div id="integrity-vendor-detail" class="is-hidden">
      <!-- 상단: 제조사 정보 & 편집 -->
      <div class="mdm-detail-section mdm-vendor-info">
        <h3 id="integrity-vendor-title">제조사 편집</h3>
        <div class="catalog-integrity-form-grid">
          <label id="integrity-vendor-source-label">원래 제조사명
            <input type="text" class="input-text" id="integrity-vendor-source" readonly>
          </label>
          <label>정식 제조사명
            <input type="text" class="input-text" id="integrity-vendor-canonical" placeholder="대표 제조사명 입력">
          </label>
          <label class="catalog-integrity-checkbox vendor-apply-row is-hidden" id="integrity-vendor-apply-row">
            <input type="checkbox" id="integrity-vendor-apply-products" checked>
            기존 제품의 제조사명도 일괄 변경
          </label>
          <label>Alias 목록</label>
          <div class="tag-input-wrap">
            <span class="tag-list" id="integrity-vendor-alias-list"></span>
            <input type="text" class="tag-input-field vendor-write-only" id="integrity-vendor-alias-input" placeholder="alias 입력 후 Enter">
          </div>
        </div>
        <div class="catalog-integrity-form-actions">
          <button type="button" class="btn btn-primary vendor-write-only" id="btn-integrity-vendor-save">저장</button>
          <button type="button" class="btn btn-danger vendor-write-only is-hidden" id="btn-integrity-vendor-delete">삭제</button>
          <button type="button" class="btn btn-secondary" id="btn-integrity-vendor-cancel">취소</button>
        </div>
      </div>

      <!-- 하단: 제품 리스트 & 유사제품 검색 -->
      <div class="mdm-detail-section mdm-product-section">
        <div class="mdm-panel-toolbar">
          <h3 id="integrity-product-title">제품 목록</h3>
          <input type="text" class="input-search" id="integrity-product-search" placeholder="제품 검색">
        </div>
        <div id="grid-integrity-products" class="ag-theme-quartz mdm-product-grid"></div>
      </div>
    </div>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/infra_catalog_integrity.js"></script>
{% endblock %}
