services:
  pjtmgr-db:
    image: postgres:16
    container_name: pjtmgr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pjtmgr
      POSTGRES_USER: pjtmgr
      POSTGRES_PASSWORD: pjtmgr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pjtmgr -d pjtmgr"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pjtmgr_postgres_data:/var/lib/postgresql/data

  pjtmgr-app:
    container_name: pjtmgr-app
    build:
      context: /service/services/pjtmgr
    depends_on:
      pjtmgr-db:
        condition: service_healthy
    env_file:
      - /service/services/pjtmgr/.env
    environment:
      ENV: production
      DATABASE_URL: postgresql://pjtmgr:pjtmgr@pjtmgr-db:5432/pjtmgr
      SESSION_SECRET_KEY: ray-pjtmgr-session-secret-change-this
      BOOTSTRAP_ADMIN_LOGIN_ID: admin
      BOOTSTRAP_ADMIN_PASSWORD: change-this-admin-password
      BOOTSTRAP_ADMIN_NAME: 관리자
      ENABLED_MODULES: common,accounting,infra
      APP_ROOT_PATH: /pjtmgr
      SKIP_LIFESPAN_ALEMBIC: "1"
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 9000"]
    ports:
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

volumes:
  pjtmgr_postgres_data:
    name: pjtmgr_postgres_data
